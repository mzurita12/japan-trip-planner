function genId(){ return "x"+Date.now()+Math.random().toString(36).slice(2,6); }
function timeAgo(ts){ if(!ts) return ""; const m=Math.floor((Date.now()-new Date(ts))/60000); if(m<1) return "just now"; if(m<60) return m+"m ago"; const h=Math.floor(m/60); if(h<24) return h+"h ago"; return Math.floor(h/24)+"d ago"; }
function toMins(t){ if(!t) return 0; const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i); if(!m) return 0; let h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase(); if(ap==="PM"&&h!==12)h+=12; if(ap==="AM"&&h===12)h=24; return h*60+mn; }
function btInfo(id){ return BLOCK_TYPES.find(x=>x.id===id)||BLOCK_TYPES[3]; }

// Firebase sync
function saveToDb(){
  set(tripRef, state).catch(e=>console.error("Save failed:",e));
}

onValue(tripRef, (snapshot)=>{
  const data = snapshot.val();
  if(data && data.blocks && data.checklist){
    state.blocks = data.blocks;
    state.checklist = data.checklist;
    if(dbLoaded) render();
  }
  dbLoaded = true;
  render();
});

function render(){
  if(!currentUser){ renderUserPicker(); return; }
  renderApp();
}

function renderCalendar(){

  const dayTabs = DAYS.map(day=>{
    const tc2=THEME[day.theme], active=day.day===currentDay, cnt=state.blocks.filter(b=>b.day===day.day).length;
    return `<button onclick="switchDay(${day.day})" style="flex-shrink:0;background:none;border:none;padding:10px 14px 8px;cursor:pointer;border-bottom:${active?`3px solid ${tc2.accent}`:"3px solid transparent"};min-width:80px;text-align:center">

      <div style="font-size:13px;color:${active?"#1A1A2E":"#666"};font-weight:${active?700:400};margin-top:1px">${day.date}</div>
      <div style="font-size:10px;color:${active?tc2.accent:"#bbb"};margin-top:1px">${day.city}</div>

  }).join("");

  const hourRows = HOURS.map((hour,hi)=>{
    const hBlocks = dayBlocks.filter(b=>b.startTime===hour);
    const isEven = hi%2===0;
    const blockHtml = hBlocks.map(block=>{
      const bt=btInfo(block.type);
      return `<div onclick="openEditBlock('${block.id}')" style="background:${bt.bg};border:1.5px solid ${bt.color}33;border-left:3px solid ${bt.color};border-radius:8px;padding:7px 10px;cursor:pointer;flex:1 1 180px;max-width:360px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div style="font-size:12px;font-weight:700;color:#1A1A2E;line-height:1.3">${block.title}</div>
          <span style="font-size:9px;background:${bt.color}18;color:${bt.color};border-radius:8px;padding:2px 6px;white-space:nowrap;font-weight:600">${bt.label}</span>
        </div>
        <div style="font-size:10px;color:${bt.color};font-weight:600;margin-top:3px">${block.startTime}${block.endTime?" → "+block.endTime:""}</div>
        ${block.notes?`<div style="font-size:11px;color:#888;margin-top:3px;line-height:1.3">${block.notes}</div>`:""}
        <div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap">
          ${block.assigned?`<span style="font-size:10px;color:${PERSON_COLORS[block.assigned]||"#888"};font-weight:600">👤 ${block.assigned}</span>`:""}
          ${block.lastEditedBy?`<span style="font-size:9px;color:#ccc">edited by ${block.lastEditedBy} ${timeAgo(block.lastEditedAt)}</span>`:""}
        </div>
      </div>`;
    }).join("");

    const emptySlot = hBlocks.length===0 ? `<div onclick="openAddBlock(${currentDay},'${hour}')" style="height:34px;flex:1;border-radius:6px;border:1.5px dashed #E0DAD4;display:flex;align-items:center;padding-left:12px;color:#D0C8C0;font-size:11px;cursor:pointer">+ add block</div>` : "";

    return `<div style="display:flex;gap:12px;border-bottom:1px solid ${isEven?"#EDE8E0":"#F0EBE4"};min-height:48px;background:${isEven?"#FAFAF8":"#fff"}">

          ${item.lastEditedBy?`<div style="font-size:9px;color:#ddd;margin-top:2px">edited by ${item.lastEditedBy} ${timeAgo(item.lastEditedAt)}</div>`:""}

    }).join("");

    return `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">

      </div>

  document.getElementById("main-content").innerHTML = `

window.cycleStatus = function(id){
  const idx = state.checklist.findIndex(c=>c.id===id);
  if(idx===-1) return;
  const cur = STATUS_CYCLE.indexOf(state.checklist[idx].status);
  state.checklist[idx] = {...state.checklist[idx], status:STATUS_CYCLE[(cur+1)%STATUS_CYCLE.length], lastEditedBy:currentUser, lastEditedAt:new Date().toISOString()};
  saveToDb();
  renderChecklist();
}

// Modal functions
window.openAddBlock = function(day, hour){
  modal = {type:"block",mode:"add",data:{id:null,day,startTime:hour,endTime:"",type:"activity",title:"",notes:"",assigned:currentUser}};
  renderModal();
}
window.openEditBlock = function(id){
  const block = state.blocks.find(b=>b.id===id);
  if(!block) return;
  modal = {type:"block",mode:"edit",data:{...block}};
  renderModal();
}
window.openAddChecklist = function(category){
  modal = {type:"checklist",mode:"add",data:{id:null,category,title:"",detail:"",date:"",startTime:"",endTime:"",status:"not-started",assigned:currentUser,confirmNum:"",cost:"",notes:""}};
  renderModal();
}
window.openEditChecklist = function(id){
  const item = state.checklist.find(c=>c.id===id);
  if(!item) return;
  modal = {type:"checklist",mode:"edit",data:{...item}};
  renderModal();
}
window.closeModal = function(){ modal=null; document.getElementById("modal-container").innerHTML=""; }

window.saveModal = function(){
  const d = modal.data;
  const ts = new Date().toISOString();
  if(modal.type==="block"){
    if(modal.mode==="add"){
      state.blocks.push({...d,id:genId(),lastEditedBy:currentUser,lastEditedAt:ts});
    } else {
      const idx=state.blocks.findIndex(b=>b.id===d.id);
      if(idx!==-1) state.blocks[idx]={...d,lastEditedBy:currentUser,lastEditedAt:ts};
    }
  } else {
    if(modal.mode==="add"){
      state.checklist.push({...d,id:genId(),lastEditedBy:currentUser,lastEditedAt:ts});
    } else {
      const idx=state.checklist.findIndex(c=>c.id===d.id);
      if(idx!==-1) state.checklist[idx]={...d,lastEditedBy:currentUser,lastEditedAt:ts};
    }
  }
  saveToDb();
  modal=null;
  document.getElementById("modal-container").innerHTML="";
  if(currentTab==="calendar") renderCalendar(); else renderChecklist();
}

window.deleteModal = function(){
  if(!confirm("Delete this item?")) return;
  if(modal.type==="block") state.blocks=state.blocks.filter(b=>b.id!==modal.data.id);
  else state.checklist=state.checklist.filter(c=>c.id!==modal.data.id);
  saveToDb();
  modal=null;
  document.getElementById("modal-container").innerHTML="";
  if(currentTab==="calendar") renderCalendar(); else renderChecklist();
}

window.updateField = function(field, value){
  modal.data[field] = field==="day" ? parseInt(value) : value;
}

    <div style="margin-bottom:13px"><label style="${lbl}">Details</label><input style="${inp}" value="${d.detail||""}" oninput="updateField('detail',this.value)" placeholder="e.g. Jul 22 – 6 people"/></div>
    <div style="margin-bottom:13px"><label style="${lbl}">Date</label><input style="${inp}" value="${d.date||""}" oninput="updateField('date',this.value)" placeholder="e.g. Jul 22"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div><label style="${lbl}">Start Time</label>
        <select style="${inp}" onchange="updateField('startTime',this.value)">
          <option value="">– none –</option>
          ${HOURS.map(h=>`<option value="${h}" ${d.startTime===h?"selected":""}>${h}</option>`).join("")}
        </select>
      </div>
      <div><label style="${lbl}">End Time</label>
        <select style="${inp}" onchange="updateField('endTime',this.value)">
          <option value="">– none –</option>
          ${HOURS.map(h=>`<option value="${h}" ${d.endTime===h?"selected":""}>${h}</option>`).join("")}
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div><label style="${lbl}">Status</label>
        <select style="${inp}" onchange="updateField('status',this.value)">
          ${STATUS_CYCLE.map(s=>`<option value="${s}" ${d.status===s?"selected":""}>${STATUS_LABELS[s]}</option>`).join("")}
        </select>
      </div>
      <div><label style="${lbl}">Assigned To</label>
        <select style="${inp}" onchange="updateField('assigned',this.value)">
          <option value="">– Unassigned –</option>
          ${PEOPLE.map(p=>`<option value="${p}" ${d.assigned===p?"selected":""}>${p}</option>`).join("")}
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div><label style="${lbl}">Confirmation #</label><input style="${inp}" value="${d.confirmNum||""}" oninput="updateField('confirmNum',this.value)" placeholder="e.g. RES-12345"/></div>
      <div><label style="${lbl}">Cost (Est.)</label><input style="${inp}" value="${d.cost||""}" oninput="updateField('cost',this.value)" placeholder="e.g. ¥15,000"/></div>
    </div>
    <div style="margin-bottom:13px"><label style="${lbl}">Notes</label><textarea style="${inp};resize:vertical;min-height:55px" oninput="updateField('notes',this.value)">${d.notes||""}</textarea></div>`;

  document.getElementById("modal-container").innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end;justify-content:center">
      <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:20px 20px 40px;box-shadow:0 -8px 40px rgba(0,0,0,0.2)">
        <div style="width:38px;height:4px;background:#E0DAD4;border-radius:2px;margin:0 auto 18px"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <div style="font-size:17px;font-weight:700">${isEdit?"Edit":"Add"} ${isBlock?"Calendar Block":"Checklist Item"}</div>
          <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#bbb">✕</button>
        </div>
        ${isBlock ? blockForm : checklistForm}
        <div style="display:flex;gap:8px;margin-top:20px">
          ${isEdit?`<button onclick="deleteModal()" style="background:#fff;border:1.5px solid #e74c3c;color:#e74c3c;border-radius:9px;padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer">Delete</button>`:""}
          <button onclick="closeModal()" style="background:#F0EBE4;border:none;color:#888;border-radius:9px;padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer">Cancel</button>
          <button onclick="saveModal()" style="flex:1;background:#1A1A2E;border:none;color:#fff;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer">${isEdit?"Save Changes":"Add "+(isBlock?"Block":"Item")}</button>
        </div>
      </div>
    </div>`;
}

window.renderModal = renderModal;
</script>
</head>
<body style="margin:0;padding:0">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1A1A2E;color:#fff;font-family:system-ui,sans-serif;font-size:16px">
    Loading Japan Trip Planner...
  </div>
</body>
</html>
